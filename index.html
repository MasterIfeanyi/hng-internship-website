<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Developer Journey</title>
    
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header Section -->
    <div class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-4">HNG Internship</h1>
            <p class="">
                A fullstack web development internship run by <strong>Hotels.ng</strong>
                Over four stages, interns built real-world projects covering
                server-side rendering, REST APIs, and terminal applications.
            </p>
            <div class="mt-3">
                <span class="badge bg-dark">Web Development</span>
                <span class="badge bg-dark">M.E.R.N</span>
                <span class="badge bg-dark">4 STAGES</span>
            </div>
        </header>

        <!-- Projects Section with Tabs -->
        <section class="section">
            <h2 class="mb-4 text-center">Tracks</h2>
            
            <!-- Bootstrap Tabs -->
            <ul class="nav nav-tabs" id="projectTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="backend-tab" data-bs-toggle="tab"
                            data-bs-target="#backend" type="button" role="tab">
                        Backend
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="frontend-tab" data-bs-toggle="tab"
                            data-bs-target="#frontend" type="button" role="tab">
                        Frontend
                    </button>
                </li>
            </ul>

            <!-- Tab Content -->
            <div class="tab-content mt-4" id="projectTabsContent">
                <!-- Backend Projects -->
                <div class="tab-pane fade show active" id="backend" role="tabpanel">
                    <div id="backend-projects" class="row">
                        <!-- Backend projects will be loaded here by JavaScript -->
                    </div>
                </div>

                <!-- Frontend Projects -->
                <div class="tab-pane fade" id="frontend" role="tabpanel">
                    <div id="frontend-projects" class="row">
                        <!-- Frontend projects will be loaded here by JavaScript -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Admin Link (Hidden at bottom) -->
        <footer class="text-center mt-5">
            <a href="admin.html" class="text-muted small">Admin Panel</a>
        </footer>
    </div>

    <!-- Bootstrap JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Your custom JavaScript -->
    <script src="app.js"></script>
</body>
</html>
