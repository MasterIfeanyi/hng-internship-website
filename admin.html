<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manage Projects</title>
    
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Your custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-4">Admin Panel</h1>
            <p>Manage your projects without writing code</p>
            <a href="index.html" class="btn btn-outline-dark">← Back to Portfolio</a>
        </header>

        <!-- Add/Edit Project Form -->
        <section class="mb-5">
            <div class="card p-4">
                <h2 class="mb-4" id="form-title">Add New Project</h2>
                
                <form id="project-form">
                    <!-- Hidden field for editing -->
                    <input type="hidden" id="project-id">
                    
                    <!-- Project Title -->
                    <div class="mb-3">
                        <label for="title" class="form-label">Project Title *</label>
                        <input type="text" class="form-control" id="title" 
                               placeholder="e.g., Stage 1 — Portfolio Website" required>
                    </div>

                    <!-- Project Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Description *</label>
                        <textarea class="form-control" id="description" rows="4" 
                                  placeholder="Describe what you built..." required></textarea>
                    </div>

                    <!-- Track Selection -->
                    <div class="mb-3">
                        <label for="track" class="form-label">Track *</label>
                        <select class="form-select" id="track" required>
                            <option value="">Choose a track...</option>
                            <option value="backend">Backend</option>
                            <option value="frontend">Frontend</option>
                        </select>
                    </div>

                    <!-- GitHub Link -->
                    <div class="mb-3">
                        <label for="github" class="form-label">GitHub Repository Link</label>
                        <input type="url" class="form-control" id="github" 
                               placeholder="https://github.com/username/repo">
                    </div>

                    <!-- Live Preview Link -->
                    <div class="mb-3">
                        <label for="live" class="form-label">Live Preview Link</label>
                        <input type="url" class="form-control" id="live" 
                               placeholder="https://your-project.vercel.app">
                    </div>

                    <!-- Form Buttons -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark" id="submit-btn">
                            Add Project
                        </button>
                        <button type="button" class="btn btn-outline-dark" id="cancel-btn" style="display: none;">
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- List of Projects -->
        <section>
            <h2 class="mb-4">Your Projects</h2>
            
            <!-- Backend Projects -->
            <div class="mb-4">
                <h3 class="h5 mb-3">Backend Projects</h3>
                <div id="admin-backend-list" class="list-group">
                    <!-- Backend projects will be listed here -->
                </div>
            </div>

            <!-- Frontend Projects -->
            <div class="mb-4">
                <h3 class="h5 mb-3">Frontend Projects</h3>
                <div id="admin-frontend-list" class="list-group">
                    <!-- Frontend projects will be listed here -->
                </div>
            </div>
        </section>
    </div>

    <!-- Bootstrap JS from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Your custom JavaScript -->
    <script src="app.js"></script>
</body>
</html>
